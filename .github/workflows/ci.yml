name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify adaptor packages have MIT license
        run: |
          FAILED=0
          for pkg in packages/interfaces packages/plugins packages/create-goofre-ucp; do
            if [ ! -f "$pkg/LICENSE" ]; then
              echo "❌ Missing LICENSE in $pkg"
              FAILED=1
            else
              if ! grep -q "MIT License" "$pkg/LICENSE"; then
                echo "❌ $pkg/LICENSE is not MIT"
                FAILED=1
              else
                echo "✅ $pkg/LICENSE — MIT"
              fi
            fi
          done
          if [ ! -f "LICENSE" ]; then
            echo "❌ Missing root LICENSE"
            FAILED=1
          else
            if ! grep -q "Business Source License" "LICENSE"; then
              echo "❌ Root LICENSE is not BSL 1.1"
              FAILED=1
            else
              echo "✅ Root LICENSE — BSL 1.1"
            fi
          fi
          exit $FAILED

  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test -- -- --ci --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@e28ff129e5465c2c0dcc6f003fc735cb6ae0c673 # v4.5.0
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build All Packages
        run: npm run build

  mock-server-health:
    name: Mock Server Smoke Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start mock server in background
        run: npx ts-node packages/mock-server/src/server.ts &
        env:
          PORT: 3001

      - name: Wait for server
        run: npx --yes wait-on http://localhost:3001/health --timeout 15000

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health)
          if [ "$STATUS" != "200" ]; then echo "Health check failed: $STATUS" && exit 1; fi

      - name: Insights endpoint check
        run: |
          RESPONSE=$(curl -s http://localhost:3001/api/insights)
          echo "$RESPONSE" | python3 -c "import sys,json; data=json.load(sys.stdin); assert len(data) > 0, 'Empty insights array'"
          echo "✓ /api/insights returns $(echo $RESPONSE | python3 -c "import sys,json; print(len(json.load(sys.stdin)))"  ) insights"

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard results
        uses: github/codeql-action/upload-sarif@b611370bb5703a7efb587f9d136a52ea24c5c38c # v3.25.11
        with:
          sarif_file: results.sarif
