version: '3.8'

services:
  # ─── Mock API Server ──────────────────────────────────────────────────────────
  # Serves UCP-compliant insight payloads without requiring any live API keys.
  # This is the backend the Merchant Dashboard PWA (Repo B) connects to for demos.
  mock-server:
    build:
      context: ./packages/mock-server
      dockerfile: Dockerfile
    image: goofre/mock-server:local
    container_name: goofre-mock-server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - goofre-net

  # ─── Core Engine Dev Watcher ─────────────────────────────────────────────────
  # Compiles the TypeScript core-engine in watch mode.
  # Useful when actively developing the orchestration layer.
  core-engine-dev:
    image: node:20-alpine
    container_name: goofre-core-engine-dev
    working_dir: /app
    volumes:
      - .:/app
      - core-node-modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
    networks:
      - goofre-net
    profiles:
      - dev # Only started when: docker compose --profile dev up

networks:
  goofre-net:
    driver: bridge

volumes:
  core-node-modules:
