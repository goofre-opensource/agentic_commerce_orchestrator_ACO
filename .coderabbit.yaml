language: en-US
early_access: true

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_instructions:
    - path: "packages/core-engine/src/orchestrator/**"
      instructions: |
        Verify all data passing through the SwitchboardOrchestrator is validated against
        a UCP schema type (UCPProduct, UCPInventorySnapshot, UCPOrderEvent, UCPInsight).
        Reject any raw 'any' types or unvalidated pass-throughs.

    - path: "packages/plugins/**"
      instructions: |
        Verify plugin implements the IGoofRePlugin interface from @goofre/core-engine.
        All output must be a valid UCP schema type. Plugin must NOT contain UI code.

    - path: "packages/mock-server/**"
      instructions: |
        Mock server is for hackathon/demo only. Ensure no real API keys, tokens, or
        PII are hard-coded. All fixtures must use clearly synthetic data.

  finishing_touches:
    docstrings:
      enabled: true

chat:
  auto_reply: true
